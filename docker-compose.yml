version: "3.8"

services:
  service-a:
    image: 194013835483.dkr.ecr.us-west-2.amazonaws.com/service-a:1.1
    container_name: service-a
    ports:
      - "8080:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  service-b:
    image: 194013835483.dkr.ecr.us-west-2.amazonaws.com/service-b:1.1
    container_name: service-b
    ports:
      - "8081:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s